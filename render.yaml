services:
  - type: web
    name: nft-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    rootDir: nft-frontend
    envVars:
      - key: REACT_APP_SUPABASE_URL
        sync: false
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
